# Public-source allowlist for dao-skill.
# The fetcher only reads sources declared here. Keep source/license metadata.

defaults:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/115.0.0.0 Safari/537.36"
  sleep_seconds: 1.2
  timeout_seconds: 30
  obey_robots_txt: false

sources:
  - id: maozedong_mia
    enabled: true
    group: "毛泽东著作"
    collection: "maozedong"
    author: "毛泽东"
    work: "中文马克思主义文库·毛泽东"
    type: "mia_index"
    index_urls:
      - "https://www.marxists.org/chinese/maozedong/index.htm"
    url_allowlist:
      - "^https://www\\.marxists\\.org/chinese/maozedong/[^#?]+\\.htm$"
      - "^https://www\\.marxists\\.org/chinese/maozedong/\\d{4}/[^#?]+\\.htm$"
    url_exclude_patterns:
      - "\\.pdf$"
      - "\\.jpg$"
      - "\\.png$"
      - "/collect/"
      - "mailto:"
      - "#"
    work_allowlist:
      - "中文马克思主义文库·毛泽东"
    title_required_patterns:
      - ".{2,}"
    title_exclude_patterns:
      - "～"
      - "全部导航"
      - "视觉焦点"
      - "最热文章"
      - "相关阅读"
      - "推荐阅读"
      - "返回"
    license_note: "Marxists Internet Archive states its archive content is free and is public domain, GFDL, or used with permission. Preserve attribution and source URL."
    risk_note: "Mao Zedong texts may have jurisdiction-dependent copyright status; review before redistribution, especially for full modern editions."

  - id: wang_yangming_wikisource
    enabled: true
    group: "王阳明心学"
    collection: "wang_yangming"
    author: "王守仁"
    work: "王守仁作品"
    type: "wikisource_pages"
    api_url: "https://zh.wikisource.org/w/api.php"
    page_prefixes:
      - "傳習錄"
    page_titles:
      - "大學問"
      - "尊經閣記"
      - "象祠記"
      - "瘞旅文"
      - "教條示龍場諸生"
      - "觀德亭記"
      - "諭俗文"
      - "鄉約告諭"
      - "告諭"
      - "平茶寮碑"
      - "平浰頭碑"
    work_allowlist:
      - "傳習錄"
      - "大學問"
      - "尊經閣記"
      - "象祠記"
      - "瘞旅文"
      - "教條示龍場諸生"
      - "觀德亭記"
      - "諭俗文"
      - "鄉約告諭"
      - "告諭"
      - "平茶寮碑"
      - "平浰頭碑"
    title_required_patterns:
      - "^(傳習錄|大學問|尊經閣記|象祠記|瘞旅文|教條示龍場諸生|觀德亭記|諭俗文|鄉約告諭|告諭|平茶寮碑|平浰頭碑)"
    title_exclude_patterns:
      - "孫子兵法"
      - "孙子兵法"
      - "格言聯璧"
      - "格言联璧"
      - "始計篇"
      - "作戰篇"
      - "軍形篇"
      - "兵勢篇"
      - "虛實篇"
      - "軍爭篇"
      - "九變篇"
      - "行軍篇"
      - "地形篇"
      - "九地篇"
      - "火攻篇"
      - "用間篇"
    license_note: "Wikisource texts are free of copyright or available under Creative Commons Attribution/Share-Alike; preserve page URL and attribution metadata."
    risk_note: "Prefer original public-domain text. Avoid copying modern copyrighted annotations or translations."

  - id: wang_yangming_gutenberg_fallback
    enabled: true
    group: "王阳明心学"
    collection: "wang_yangming"
    author: "王守仁"
    work: "傳習錄"
    type: "plain_text_urls"
    text_urls:
      - title: "傳習錄（Project Gutenberg）"
        url: "https://www.gutenberg.org/ebooks/25517.txt.utf-8"
    work_allowlist:
      - "傳習錄"
    title_required_patterns:
      - "傳習錄"
    title_exclude_patterns: []
    license_note: "Project Gutenberg states this eBook is public domain in the USA. Preserve eBook URL and attribution."
    risk_note: "Fallback source for full-text coverage when Wikisource subpages are rate-limited; verify jurisdiction before redistribution."

  - id: zeng_guofan_wikisource
    enabled: true
    group: "曾国藩家书"
    collection: "zeng_guofan"
    author: "曾国藩"
    work: "曾文正公全集"
    type: "wikisource_pages"
    api_url: "https://zh.wikisource.org/w/api.php"
    page_prefixes:
      - "曾文正公家書"
      - "曾文正公書劄"
      - "曾文正公書札"
      - "曾文正公家訓"
    page_titles:
      - "曾文正公全集"
    work_allowlist:
      - "曾文正公家書"
      - "曾文正公書劄"
      - "曾文正公書札"
      - "曾文正公家訓"
    title_required_patterns:
      - "^曾文正公(家書|書劄|家訓)"
    title_exclude_patterns:
      - "西廂記"
      - "西厢记"
      - "第[一二三四五六七八九十百零〇]+回"
      - "第[一二三四五六七八九十百零〇]+本"
    license_note: "Wikisource texts are free of copyright or available under Creative Commons Attribution/Share-Alike; preserve page URL and attribution metadata."
    risk_note: "Use public-domain originals; do not import modern edited/annotated editions unless their license is explicit."

  - id: zeng_guofan_gushiwen_fallback
    enabled: true
    group: "曾国藩家书"
    collection: "zeng_guofan"
    author: "曾国藩"
    work: "曾国藩家书（古诗文网备选）"
    type: "mia_index"
    index_urls:
      - "https://www.gushiwen.cn/guwen/book.aspx?id=220"
    url_allowlist:
      - "^https://www\\.gushiwen\\.cn/guwen/bookv_[^#?]+\\.aspx$"
      - "^https://so\\.gushiwen\\.cn/guwen/bookv_[^#?]+\\.aspx$"
    url_exclude_patterns:
      - "\\.jpg$"
      - "\\.png$"
      - "user/"
    work_allowlist:
      - "曾国藩家书（古诗文网备选）"
    title_required_patterns:
      - "篇·"
    title_exclude_patterns:
      - "西厢记"
      - "西廂記"
      - "第[一二三四五六七八九十百零〇]+回"
      - "第[一二三四五六七八九十百零〇]+本"
    license_note: "Fallback from gushiwen.cn for public-domain ancient text where Wikisource has only catalogue pages; preserve source URL."
    risk_note: "Use only filtered family-letter entries. Do not import annotations, navigation pages, novels, or unrelated classics."
